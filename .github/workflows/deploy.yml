name: Deploy (Devvit)

# CD half of the pipeline. Runs the full validation gate as a release check, then
# uploads a new Devvit version. Manual by default (workflow_dispatch) so a push
# to main never fails just because deploy auth isn't wired up yet; flip on the
# `push` trigger below once DEVVIT_TOKEN is configured to auto-deploy on merge.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

jobs:
  deploy:
    name: Validate · Upload to Devvit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Never ship a broken build — the same gate CI runs, as a release guard.
      - name: Validate
        run: |
          npm run type-check
          npm run lint
          npm test
          npm run build
          npm run size-check

      # ubuntu-latest ships Google Chrome; the smoke harness honors CHROME_PATH.
      - name: Client smoke (headless Chrome)
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: npm run test:client

      - name: Upload to Devvit
        env:
          DEVVIT_TOKEN: ${{ secrets.DEVVIT_TOKEN }}
        run: |
          if [ -z "${DEVVIT_TOKEN:-}" ]; then
            echo "::notice::DEVVIT_TOKEN secret not set — skipping upload. Add it under" \
                 "repo Settings → Secrets and variables → Actions to enable deploys."
            exit 0
          fi
          npx devvit upload
