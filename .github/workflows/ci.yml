name: CI

on:
  push:
    branches: [main, 'build/**']
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Type-check · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Fail the build if the shipped bundle exceeds the Devvit-friendly budget.
      - name: Bundle size guard
        run: npm run size-check

      # ubuntu-latest ships Google Chrome; the smoke harness honors CHROME_PATH.
      - name: Client smoke (headless Chrome)
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: npm run test:client
