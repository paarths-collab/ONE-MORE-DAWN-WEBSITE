<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>One More Dawn</title>
  </head>
  <body class="app">
    <main class="splash-shell">
      <img class="snoo" src="/snoo.png" alt="A Reddit survivor carrying supplies for the city" />
      <div class="content">
        <p class="eyebrow">DAY ZERO · THE GATES ARE OPEN</p>
        <h1 class="title">ONE MORE DAWN</h1>
        <p class="offer">Build the last city together.</p>
      <p class="description">
          Spend today's energy, vote on the crisis, and leave your house standing in a city shared
          by this whole subreddit.
      </p>
        <div class="signals" aria-label="City status preview">
          <span><b>3</b> actions</span>
          <span><b>1</b> vote</span>
          <span><b>1</b> shared city</span>
        </div>
        <button class="start-button" id="start-button">ENTER THE CITY <span aria-hidden="true">→</span></button>
      </div>
    </main>
    <footer class="footer">ONE SUBREDDIT · ONE SHARED CITY</footer>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
